name: build-core-auto

# Automatically check for new mihomo releases and build core binaries
# for all platforms (desktop + Android .so). Publishes to GitHub Releases.

on:
  schedule:
    # Check every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: "Force build for specific version (e.g. v1.19.25). Leave empty for auto-detect."
        required: false

env:
  CORE_REPO: pluralplay/mihomo-core
  MIHOMO_REPO: MetaCubeX/mihomo

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check latest mihomo release
        id: check
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get latest mihomo release tag
          LATEST=$(curl -s "https://api.github.com/repos/${{ env.MIHOMO_REPO }}/releases/latest" | jq -r '.tag_name')
          echo "Latest mihomo version: $LATEST"

          # Check if we already built this version
          EXISTING=$(curl -s "https://api.github.com/repos/${{ env.CORE_REPO }}/releases/tags/core-$LATEST" 2>/dev/null | jq -r '.tag_name // empty')

          if [ "$EXISTING" = "core-$LATEST" ]; then
            echo "Version $LATEST already built, skipping."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New version $LATEST detected, building."
            echo "version=$LATEST" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build-desktop:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: ubuntu-latest
            arch: amd64
            goos: windows
            goarch: amd64
            ext: .exe
          - platform: windows
            os: ubuntu-latest
            arch: arm64
            goos: windows
            goarch: arm64
            ext: .exe
          - platform: linux
            os: ubuntu-latest
            arch: amd64
            goos: linux
            goarch: amd64
            ext: ""
          - platform: linux
            os: ubuntu-latest
            arch: arm64
            goos: linux
            goarch: arm64
            ext: ""
          - platform: macos
            os: macos-latest
            arch: amd64
            goos: darwin
            goarch: amd64
            ext: ""
          - platform: macos
            os: macos-latest
            arch: arm64
            goos: darwin
            goarch: arm64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache-dependency-path: core/go.sum

      - name: Build core
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd core
          go build \
            -ldflags="-w -s -X github.com/metacubex/mihomo/constant.Version=${{ needs.check.outputs.version }}" \
            -tags="with_gvisor,cmfa" \
            -o "../FlClashCore-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}"

      - name: Compress
        run: |
          gzip -9 FlClashCore-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}
          mv FlClashCore-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}.gz \
             FlClashCore-${{ matrix.platform }}-${{ matrix.arch }}-v${{ needs.check.outputs.version }}.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: FlClashCore-${{ matrix.platform }}-${{ matrix.arch }}-v*.gz

  build-android:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: armeabi-v7a
            goarch: arm
            goarm: "7"
            cc_prefix: armv7a-linux-androideabi
          - abi: arm64-v8a
            goarch: arm64
            cc_prefix: aarch64-linux-android
          - abi: x86_64
            goarch: amd64
            cc_prefix: x86_64-linux-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache-dependency-path: core/go.sum

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Build libclash.so
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CC: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc_prefix }}24-clang
          CXX: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc_prefix }}24-clang++
        run: |
          cd core
          go build \
            -buildmode=c-shared \
            -ldflags="-w -s -X github.com/metacubex/mihomo/constant.Version=${{ needs.check.outputs.version }}" \
            -tags="with_gvisor,cmfa" \
            -o "../libclash-android-${{ matrix.abi }}.so"

      - name: Compress
        run: |
          gzip -9 libclash-android-${{ matrix.abi }}.so
          mv libclash-android-${{ matrix.abi }}.so.gz \
             libclash-android-${{ matrix.abi }}-v${{ needs.check.outputs.version }}.so.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: libclash-android-${{ matrix.abi }}-v*.so.gz

  release:
    needs: [check, build-desktop, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "core-${{ needs.check.outputs.version }}"
          name: "Core ${{ needs.check.outputs.version }}"
          body: |
            Mihomo core ${{ needs.check.outputs.version }}

            **Desktop**: FlClashCore-{platform}-{arch}-v{version}.gz
            **Android**: libclash-android-{abi}-v{version}.so.gz
          prerelease: false
          files: dist/*
